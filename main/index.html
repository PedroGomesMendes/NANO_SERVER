
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NANEYE Viewer - Pro</title>
<style>
  body { background: #111; color: #eee; text-align: center; font-family: sans-serif; margin: 20px; }
  canvas { border: 2px solid #444; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
  .container { display: flex; align-items: flex-start; gap: 25px; justify-content: center; flex-wrap: wrap; }
  .panel { background: #222; padding: 15px; border-radius: 8px; text-align: left; min-width: 300px; }
  hr { border: 0; border-top: 1px solid #444; margin: 15px 0; }
  label { display: block; margin-bottom: 5px; font-weight: bold; }
  input[type="range"], select { width: 100%; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { border: 1px solid #444; padding: 4px; text-align: left; }
  th { background: #333; }
  .highlight { color: #0af; }
</style>
</head>
<body>

<h2>NANEYE Viewer </h2>

<div class="container">
  <div>
    <canvas id="cam" width="328" height="320"></canvas>
    <p id="fps_meter" style="font-family: monospace;">Waiting for data...</p>
    <button id="btnCapture" style="padding: 10px 20px; cursor: pointer; background: #0af; border: none; color: white; border-radius: 5px; font-weight: bold;">
      📸 Capture Snapshot
    </button>
  </div>

  <div class="panel">
    <label>Exposure: <span id="exposure_val" class="highlight">30</span></label>
    <input type="range" id="sld" min="0" max="150" value="30">

    <label>Gain: <span id="gain_val" class="highlight">0</span></label>
    <input type="range" id="sld_gain" min="0" max="3" value="0">

    <hr>

    <label style="font-size:16px;">
      <input type="checkbox" id="enablePipe" checked> Enable Image Pipeline
    </label>

    <div id="pipelineControls">
      <label style="color: #0af; margin-top:10px;">
        <input type="checkbox" id="enableDebayer"> Enable Debayer
      </label>

      <label style="color: #0af; margin-top:10px;"> 
        <input type="checkbox" id="enableEnhanced"> Enhance + Sharpen
      </label>

      <label style="color: #0af; margin-top:10px;"> 
        <input type="checkbox" id="enableDEMO"> ENABLE DEMO MODE 
      </label>

      <label>Contrast: <span id="contrast_val" class="highlight">1.0</span></label>
      <input type="range" id="contrast" min="0.5" max="3" step="0.1" value="1">

      <label>Brightness: <span id="bright_val" class="highlight">0</span></label>
      <input type="range" id="brightness" min="-100" max="100" value="0">

      <label>Gamma: <span id="gamma_val" class="highlight">1.0</span></label>
      <input type="range" id="gamma" min="0.3" max="2.5" step="0.1" value="1">

    </div>
  </div>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
<script>
const W = 328;
const H = 320;
const EXPECTED_FRAME_SIZE = (W * H * 3) / 2;

let busy = false;
let lastTime = performance.now();

let enablePipe = true;
let enableDebayer = false;
const bayerPattern = "GRBG";
let contrast = 1.0;
let brightness = 0;
let gamma = 1.0;

const canvas = document.getElementById('cam');
const ctx = canvas.getContext('2d');
const frameImage = ctx.createImageData(W, H);

const fpsMeter = document.getElementById('fps_meter');

const pipelineDiv = document.getElementById('pipelineControls');
const enablePipeCheckbox = document.getElementById('enablePipe');
const enableDebayerCheckbox = document.getElementById('enableDebayer');
const enableEnhancedCheckbox = document.getElementById('enableEnhanced');
const enableDEMO             = document.getElementById('enableDEMO');


const exposureSlider = document.getElementById('sld');
const exposureVal = document.getElementById('exposure_val');

const gainSlider = document.getElementById('sld_gain');
const gainVal = document.getElementById('gain_val');

const contrastSlider = document.getElementById('contrast');
const contrastVal = document.getElementById('contrast_val');

const brightnessSlider = document.getElementById('brightness');
const brightnessVal = document.getElementById('bright_val');

const gammaSlider = document.getElementById('gamma');
const gammaVal = document.getElementById('gamma_val');

function debounce(fn, delay) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), delay);
  };
}

function clamp8(v) {
  return Math.max(0, Math.min(255, v));
}

function getPixel(raw10, x, y) {
  if (x < 0 || x >= W || y < 0 || y >= H) return null;
  return raw10[y * W + x];
}

function avg(values, fallback = 0) {
  const valid = values.filter(v => v !== null && v !== undefined);
  if (valid.length === 0) return fallback;
  return valid.reduce((a, b) => a + b, 0) / valid.length;
}

function unpack12to10(raw) {
  const raw10 = new Uint16Array(W * H);
  let ptr = 0;

  for (let i = 0; i + 2 < raw.length && ptr < raw10.length; i += 3) {
    const d0 = raw[i];
    const d1 = raw[i + 1];
    const d2 = raw[i + 2];

    const p0 = ((d0 << 3) & 0x3F8) | (d1 >> 5);
    const p1 = ((d1 << 7) & 0x380) | (d2 >> 1);

    raw10[ptr++] = p0;

    if (ptr < raw10.length) {
      raw10[ptr++] = p1;
    }
  }

  return raw10;
}

function debayerOpenCV(raw10, width, height, pattern = "GRBG") {

  // RAW10 -> 8-bit
  const raw8 = new Uint8Array(width * height);

  for (let i = 0; i < raw10.length; i++) {
    raw8[i] = raw10[i] >> 2; // 10-bit -> 8-bit
  }

  const src = cv.matFromArray(height, width, cv.CV_8UC1, raw8);
  const dst = new cv.Mat();

  const codes = {
    RGGB: cv.COLOR_BayerRG2RGB,
    BGGR: cv.COLOR_BayerBG2RGB,
    GRBG: cv.COLOR_BayerGR2RGB,
    GBRG: cv.COLOR_BayerGB2RGB,
  };

  cv.cvtColor(src, dst, codes[pattern]);

  src.delete();

  return dst; // CV_8UC3
}

function applyPipeline(v) {
  let res = (v - 128) * contrast + 128 + brightness;

  if (gamma !== 1.0) {
    res = 255 * Math.pow(Math.max(0, res) / 255, gamma);
  }

  return clamp8(res);
}

function buildImageFromRaw10(raw10, options) {
  const imgData = new Uint8ClampedArray(W * H * 4);


  if (options.useDebayer) {
    if (typeof cv !== 'undefined' && cv && cv.matFromArray) {
      const dst = debayerOpenCV(raw10, W, H, options.pattern);
      // Converter para RGBA (8UC4) usando OpenCV
      const dstRGBA = new cv.Mat();
      cv.cvtColor(dst, dstRGBA, cv.COLOR_RGB2RGBA);
      // Opcional: aplicar pipeline em OpenCV (mais eficiente) - aqui mantemos JS para compatibilidade
      imgData.set(dstRGBA.data);
      dst.delete();
      dstRGBA.delete();
      return imgData;
    }

    console.warn('OpenCV not available. Debayer is disabled.');
  }

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = y * W + x;
      const outIdx = idx * 4;
      const gray = raw10[idx] >> 2;

      let value = gray;
      if (options.usePipeline) {
        value = applyPipeline(value);
      }

      imgData[outIdx] = value;
      imgData[outIdx + 1] = value;
      imgData[outIdx + 2] = value;
      imgData[outIdx + 3] = 255;
    }
  }

  return imgData;
}

async function fetchRawFrame() {
  const res = await fetch('/image?t=' + Date.now());
  const buffer = await res.arrayBuffer();
  return new Uint8Array(buffer);
}

function validateFrameSize(raw8) {
  if (raw8.length !== EXPECTED_FRAME_SIZE) {
    console.warn(`Unexpected RAW size: ${raw8.length}, expected ${EXPECTED_FRAME_SIZE}`);
  }
}

function renderFrame(processed) {
  frameImage.data.set(processed);
  ctx.putImageData(frameImage, 0, 0);
}

function enhanceProcessedImage(imgData) {
  const blackLevel = 8;
  const whiteLevel = 245;
  const scale = 255 / (whiteLevel - blackLevel);

  for (let i = 0; i < imgData.length; i += 4) {
    imgData[i]     = enhanceFast(imgData[i], blackLevel, scale);     // R
    imgData[i + 1] = enhanceFast(imgData[i + 1], blackLevel, scale); // G
    imgData[i + 2] = enhanceFast(imgData[i + 2], blackLevel, scale); // B
  }
}

function enhanceFast(v, blackLevel, scale) {
  let x = (v - blackLevel) * scale;

  // clamp rápido
  if (x < 0) x = 0;
  else if (x > 255) x = 255;

  // curva suave (contrast boost)
  x = x / 255;
  x = x * x * (3 - 2 * x); // smoothstep

  return x * 255;
}

function sharpenImage(imgData) {
  const copy = new Uint8ClampedArray(imgData); // copia original

  const w = W;
  const h = H;

  function get(x, y, c) {
    if (x < 0 || x >= w || y < 0 || y >= h) return 0;
    return copy[(y * w + x) * 4 + c];
  }

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const idx = (y * w + x) * 4;

      for (let c = 0; c < 3; c++) {
        const center = get(x, y, c);

        const sum =
          get(x-1,y,c) + get(x+1,y,c) +
          get(x,y-1,c) + get(x,y+1,c);

        const sharpened = center * 5 - sum;

        imgData[idx + c] = clamp8(sharpened);
      }
    }
  }
}

function updateFps() {
  const now = performance.now();
  const fps = (1000 / Math.max(1, now - lastTime)).toFixed(1);
  fpsMeter.innerText = `FPS: ${fps} | Resolution: ${W}x${H} | Bayer: ${bayerPattern}`;
  lastTime = now;
}

function drawBoxOnImageData(imgData, width, height, cx, cy, size) {
  const half = Math.floor(size / 2);

  const x0 = Math.max(0, cx - half);
  const x1 = Math.min(width - 1, cx + half);
  const y0 = Math.max(0, cy - half);
  const y1 = Math.min(height - 1, cy + half);

  function setPixel(x, y, r, g, b) {
    const i = (y * width + x) * 4;
    imgData[i] = r;
    imgData[i + 1] = g;
    imgData[i + 2] = b;
    imgData[i + 3] = 255;
  }

  for (let x = x0; x <= x1; x++) {
    setPixel(x, y0, 0, 255, 0);
    setPixel(x, y1, 0, 255, 0);
  }

  for (let y = y0; y <= y1; y++) {
    setPixel(x0, y, 0, 255, 0);
    setPixel(x1, y, 0, 255, 0);
  }
}

function trackRedLaser(inputImg, outputImg) {
  const laser = findRedLaser(inputImg, W, H);

  if (!laser) return;

  drawBoxOnImageData(outputImg, W, H, laser.x, laser.y, 20);
}

function findRedLaser(imgData, width, height) {
  let bestX = 0;
  let bestY = 0;
  let bestScore = 0;

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const i = (y * width + x) * 4;

      const r = imgData[i];
      const g = imgData[i + 1];
      const b = imgData[i + 2];

      const score = r - Math.max(g, b);

      if (r > 80 && score > bestScore) {
        bestScore = score;
        bestX = x;
        bestY = y;
      }
    }
  }

  if (bestScore < 40) return null;

  return { x: bestX, y: bestY, score: bestScore };
}

async function fetchFrame() {
  if (busy) return;
  busy = true;

  try {
    const raw8 = await fetchRawFrame();

    if (!raw8 || raw8.length === 0) return;

    validateFrameSize(raw8);

    const raw10 = unpack12to10(raw8);

    const processed = buildImageFromRaw10(raw10, {
      usePipeline: enablePipe,
      useDebayer: enableDebayer,
      pattern: bayerPattern,
    });


    if (enableEnhancedCheckbox.checked){
      enhanceProcessedImage(processed);
      sharpenImage(processed);
    }
    

    if (enableDEMO.checked){
      trackRedLaser(processed, processed);
    }

    renderFrame(processed);
    updateFps();
  } catch (e) {
    console.error('Fetch error:', e);
    fpsMeter.innerText = 'Fetch error: ' + e.message;
  } finally {
    busy = false;
  }
}

function loop() {
  fetchFrame();
  requestAnimationFrame(loop);
}

document.getElementById('btnCapture').onclick = () => {
  const link = document.createElement('a');
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
  link.download = `naneye_capture_${timestamp}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
};

enablePipeCheckbox.onchange = (e) => {
  enablePipe = e.target.checked;
  pipelineDiv.style.display = enablePipe ? 'block' : 'none';
};

enableDebayerCheckbox.onchange = (e) => {
  enableDebayer = e.target.checked;
};

contrastSlider.oninput = (e) => {
  contrast = parseFloat(e.target.value);
  contrastVal.innerText = contrast.toFixed(1);
};

brightnessSlider.oninput = (e) => {
  brightness = parseInt(e.target.value, 10);
  brightnessVal.innerText = brightness;
};

gammaSlider.oninput = (e) => {
  gamma = parseFloat(e.target.value);
  gammaVal.innerText = gamma.toFixed(1);
};

const sendExposure = debounce((val) => {
  fetch('/set_exposure?value=' + encodeURIComponent(val)).catch(e => console.error(e));
}, 100);

const sendGain = debounce((val) => {
  fetch('/set_gain?value=' + encodeURIComponent(val)).catch(e => console.error(e));
}, 100);

exposureSlider.oninput = (e) => {
  const val = e.target.value;
  exposureVal.innerText = val;
  sendExposure(val);
};

gainSlider.oninput = (e) => {
  const val = e.target.value;
  gainVal.innerText = val;
  sendGain(val);
};

pipelineDiv.style.display = enablePipeCheckbox.checked ? 'block' : 'none';
contrastVal.innerText = contrast.toFixed(1);
brightnessVal.innerText = brightness;
gammaVal.innerText = gamma.toFixed(1);
exposureVal.innerText = exposureSlider.value;
gainVal.innerText = gainSlider.value;

loop();
</script>

</body>
</html>
